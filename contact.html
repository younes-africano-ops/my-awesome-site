<!DOCTYPE html>
<html lang="en" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Contact Us | Bricoshop Luxury Concierge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Outfit', sans-serif; 
            color: #ffffff; 
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background-color: #1e293b; 
            /* Exact background from original design */
            background: 
                radial-gradient(circle at 90% 10%, rgba(183, 152, 96, 0.4), transparent 50%),
                linear-gradient(rgba(30, 41, 59, 0.5), rgba(15, 23, 42, 0.6)),
                url('https://images.unsplash.com/photo-1428592953211-077101b2021b?q=80&w=2000&auto=format&fit=crop');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            min-height: 100vh;
        }

        html[dir="rtl"] body { font-family: 'Noto Sans Arabic', sans-serif; }
        .glass-nav { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        .contact-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.4);
        }

        .input-line { 
            background: rgba(255, 255, 255, 0.05) !important; 
            border: 1px solid rgba(255, 255, 255, 0.1) !important; 
            padding: 15px; 
            border-radius: 12px;
            color: white !important;
            outline: none;
            transition: 0.3s;
            width: 100%;
        }
        .input-line:focus { border-color: #c5a059 !important; background: rgba(255,255,255,0.1) !important; }

        .text-brico { color: #c5a059; }
        .bg-brico { background-color: #c5a059; }

        @media (max-width: 768px) {
            .mobile-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 400px; background: #1a1a1a; border-radius: 24px; display: flex; justify-content: space-around; padding: 12px; z-index: 999; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
            .mobile-link { color: #777; display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; }
            .mobile-link.active { color: #fff; }
        }
    </style>
</head>
<body class="antialiased">

    <div id="success-popup" class="fixed inset-0 z-[1000] hidden items-center justify-center bg-slate-950/90 backdrop-blur-md">
        <div class="text-center p-10 contact-card max-w-sm">
            <div class="w-20 h-20 bg-brico/20 text-brico rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-check text-3xl"></i>
            </div>
            <h2 class="text-2xl font-bold mb-2 uppercase tracking-tighter">Request Sent</h2>
            <p class="text-slate-400 text-sm mb-8">We have received your inquiry and will contact you via WhatsApp shortly.</p>
            <button onclick="closeSuccess()" class="w-full border border-white/20 py-4 rounded-xl text-[10px] font-bold uppercase tracking-widest hover:bg-white/5 transition-colors">Close</button>
        </div>
    </div>

    <nav class="fixed w-full z-50 glass-nav hidden md:block">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex-1"><a href="index.html" class="text-2xl font-bold tracking-tighter uppercase">Bricoshop</a></div>
            <div class="flex items-center justify-center gap-8 flex-1">
                <a href="index.html" class="text-[11px] font-bold uppercase tracking-[0.2em] hover:text-brico transition-colors">Home</a>
                <a href="pricing.html" class="text-[11px] font-bold uppercase tracking-[0.2em] hover:text-brico transition-colors">Collection</a>
                <a href="about.html" class="text-[11px] font-bold uppercase tracking-[0.2em] hover:text-brico transition-colors">Why PVC</a>
                <a href="contact.html" class="text-[11px] font-bold uppercase tracking-[0.2em] text-brico">Contact</a>
            </div>
            <div class="flex-1 flex justify-end">
                <button onclick="toggleLanguage()" class="text-[11px] font-bold text-white border border-white/20 px-5 py-2 rounded-full hover:bg-white/10 transition-all">العربية</button>
            </div>
        </div>
    </nav>

    <div class="mobile-bar md:hidden">
        <a href="index.html" class="mobile-link"><i class="fas fa-home text-lg mb-1"></i>Home</a>
        <a href="pricing.html" class="mobile-link"><i class="fas fa-th-large text-lg mb-1"></i>Catalog</a>
        <a href="about.html" class="mobile-link"><i class="fas fa-info-circle text-lg mb-1"></i>About</a>
        <a href="contact.html" class="mobile-link active"><i class="fas fa-envelope text-lg mb-1"></i>Contact</a>
    </div>

    <div class="pt-24 md:pt-48 pb-32 px-6">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row gap-12 items-center">
            <div class="w-full md:w-1/2">
                <span class="text-brico text-[10px] font-bold uppercase tracking-[0.5em] mb-4 block">Concierge Service</span>
                <h1 class="text-5xl md:text-7xl font-bold uppercase tracking-tighter leading-none mb-8">Request<br>Pricing.</h1>
                <p class="text-slate-400 text-lg leading-relaxed max-w-md">Our team will provide a tailored quote for your project within 24 hours.</p>
            </div>

            <div class="w-full md:w-1/2 contact-card p-8 md:p-12">
                <form id="contact-form" action="https://api.web3forms.com/submit" method="POST" class="space-y-6">
                    <input type="hidden" name="access_key" value="ef440d90-28c6-4d6a-8080-bb6f220bc415">
                    <input type="hidden" name="subject" value="New Website Inquiry - Bricoshop">
                    <input type="checkbox" name="botcheck" class="hidden" style="display: none;">

                    <div>
                        <label class="text-[10px] font-bold uppercase tracking-widest text-slate-500 mb-3 block">Full Name</label>
                        <input type="text" name="name" placeholder="Your Name" required class="input-line">
                    </div>

                    <div>
                        <label class="text-[10px] font-bold uppercase tracking-widest text-slate-500 mb-3 block">WhatsApp / Phone</label>
                        <input type="tel" name="phone" placeholder="+212 ..." required class="input-line">
                    </div>

                    <div>
                        <label class="text-[10px] font-bold uppercase tracking-widest text-slate-500 mb-3 block">Selected Product</label>
                        <input type="text" name="requested_product" id="category-field" placeholder="Select from catalog..." class="input-line">
                    </div>

                    <div>
                        <label class="text-[10px] font-bold uppercase tracking-widest text-slate-500 mb-3 block">Inquiry Details</label>
                        <textarea name="message" id="details-field" rows="3" placeholder="Additional requirements..." class="input-line"></textarea>
                    </div>

                    <button type="submit" class="w-full bg-brico text-slate-950 py-5 rounded-2xl font-bold uppercase text-[11px] tracking-[0.3em] hover:scale-[1.02] transition-all active:scale-95 shadow-xl">
                        Submit Inquiry
                    </button>
                    <p id="result" class="text-center text-[10px] font-bold uppercase tracking-widest mt-4"></p>
                </form>
                </div>
        </div>
    </div>

    <script>
        // Restored Language State and Product Transfer Logic
        let currentLang = localStorage.getItem('selectedLang') || 'en';

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            localStorage.setItem('selectedLang', currentLang);
            location.reload();
        }

        document.addEventListener('DOMContentLoaded', function() {
            // Restore Product Transfer Logic
            const urlParams = new URLSearchParams(window.location.search);
            const product = urlParams.get('product');
            const ref = urlParams.get('ref');
            const color = urlParams.get('color');

            if (product) {
                const categoryField = document.getElementById('category-field');
                const detailsField = document.getElementById('details-field');
                if (categoryField) categoryField.value = `${product} (${ref})`;
                if (detailsField && color) detailsField.value = `Interest: ${product} in ${color} finish.`;
            }

            document.getElementById('main-html').setAttribute('dir', currentLang === 'ar' ? 'rtl' : 'ltr');
        });

        // FORM INTEGRATION LOGIC START
        const form = document.getElementById('contact-form');
        const result = document.getElementById('result');

        form.addEventListener('submit', function(e) {
          e.preventDefault();
          const formData = new FormData(form);
          const object = Object.fromEntries(formData);
          const json = JSON.stringify(object);
          result.innerHTML = "Submitting Inquiry...";

            fetch('https://api.web3forms.com/submit', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: json
                })
                .then(async (response) => {
                    let json = await response.json();
                    if (response.status == 200) {
                        // On success, show the special popup
                        document.getElementById('success-popup').style.display = 'flex';
                        form.reset();
                    } else {
                        console.log(response);
                        result.innerHTML = json.message;
                    }
                })
                .catch(error => {
                    console.log(error);
                    result.innerHTML = "Something went wrong. Please try again.";
                })
                .then(function() {
                    setTimeout(() => { result.innerHTML = ""; }, 4000);
                });
        });

        function closeSuccess() {
            document.getElementById('success-popup').style.display = 'none';
        }
        // FORM INTEGRATION LOGIC END
    </script>
</body>
</html>
