<!DOCTYPE html>
<html lang="en" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Professional Catalog | Bricoshop Luxury PVC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #fcfcfc; transition: background 0.3s ease; }
        html[dir="rtl"] body { font-family: 'Noto Sans Arabic', sans-serif; }
        
        .glass-nav { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(20px); }
        .text-brico-accent { color: #0d9488; }

        .category-content {
            display: none;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.4s ease;
        }
        .category-section.active .category-content {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }
        
        .market-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
            margin: 0 auto;
            width: 100%;
            max-width: 220px;
        }
        .market-card:hover {
            border-color: #e5e7eb;
            background: #fff;
            transform: translateY(-4px);
            box-shadow: 0 10px 20px -10px rgba(0,0,0,0.05);
        }

        .category-banner {
            background-size: cover;
            background-position: center;
            height: 120px;
            position: relative;
        }
        .category-banner::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
        }

        #product-modal { 
            transition: all 0.3s ease;
            pointer-events: none; 
            visibility: hidden;
            opacity: 0;
            z-index: 100;
        }
        #product-modal.active { 
            pointer-events: auto; 
            visibility: visible; 
            opacity: 1; 
        }
        
        .badge-stock { background: #ecfdf5; color: #059669; padding: 2px 8px; border-radius: 4px; font-size: 8px; font-weight: 700; text-transform: uppercase; }
        
        .lang-btn {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 16px; border-radius: 99px;
            border: 1px solid #e2e8f0; font-size: 12px; font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body class="text-slate-900 antialiased">

    <nav class="fixed w-full z-50 glass-nav border-b border-stone-100">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex-1">
                <a href="index.html" class="text-2xl font-bold tracking-tighter uppercase" data-key="brand">Bricoshop</a>
            </div>
            
            <div class="hidden md:flex flex-1 justify-center items-center gap-8 text-[11px] font-bold uppercase tracking-[0.2em] text-stone-500" id="nav-links">
                <a href="index.html" class="hover:text-black transition-colors" data-key="nav-home">Home</a>
                <a href="pricing.html" class="text-black border-b border-black pb-1" data-key="nav-catalog">Collections</a>
                <a href="about.html" class="hover:text-black transition-colors" data-key="nav-about">Why PVC?</a>
                <a href="contact.html" class="hover:text-black transition-colors" data-key="nav-contact">Contact</a>
            </div>
            
            <div class="flex-1 flex items-center justify-end gap-4">
                <button onclick="toggleLanguage()" class="lang-btn hover:bg-stone-50">
                    <i class="fas fa-globe text-brico-accent"></i>
                    <span id="lang-label">العربية</span>
                </button>
                <a href="https://wa.me/212661176190" target="_blank" class="bg-slate-900 text-white px-6 py-3 text-[10px] font-bold uppercase tracking-widest rounded-full hover:bg-black transition-all" data-key="cta-inquiry">
                    Order Inquiries
                </a>
            </div>
        </div>
    </nav>

    <main class="pt-32 pb-24 px-6 max-w-5xl mx-auto">
        <header class="mb-12 border-b border-stone-100 pb-8 text-center">
            <h1 class="text-3xl font-bold uppercase tracking-tighter mb-2" data-key="page-title">The 2026 Collection</h1>
            <p class="text-stone-400 text-sm uppercase tracking-widest" data-key="page-subtitle">Select a category to browse our luxury solutions</p>
        </header>

        <div id="market-container" class="space-y-6"></div>
    </main>

    <footer class="bg-slate-950 text-white py-12 px-6">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
            <div class="text-center md:text-left">
                <h4 class="text-lg font-bold uppercase tracking-tighter mb-1" data-key="brand-footer">Bricoshop Morocco</h4>
                <p class="text-slate-500 text-[10px] uppercase tracking-widest" data-key="brand-sub">Premium PVC Manufacturing</p>
            </div>
            <p class="text-slate-600 text-[9px] uppercase tracking-[0.3em]" data-key="copyright">© 2026 All Rights Reserved</p>
        </div>
    </footer>

    <div id="product-modal" class="fixed inset-0 flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-md" onclick="closeModal()"></div>
        <div class="relative bg-white w-full max-w-2xl overflow-hidden rounded-[2.5rem] p-8 md:p-12">
            <div class="flex flex-col items-center text-center gap-8">
                <div class="w-full max-w-[300px] aspect-square rounded-xl overflow-hidden bg-stone-50 p-6 flex items-center justify-center">
                    <img id="modal-img" src="" class="max-h-full max-w-full object-contain">
                </div>
                
                <div class="w-full flex flex-col items-center">
                    <span class="badge-stock w-fit mb-4" data-key="modal-badge">Industrial Grade</span>
                    <h2 id="modal-title" class="text-3xl font-bold uppercase tracking-tighter mb-2"></h2>
                    <p id="modal-id" class="text-[11px] text-stone-500 font-medium mb-8 leading-relaxed whitespace-pre-line"></p>
                    
                    <div class="mb-10 w-full">
                        <label class="text-[10px] font-bold uppercase tracking-widest text-stone-400 block mb-4" data-key="modal-finish">Select Finish</label>
                        <div id="modal-color-swatches" class="flex gap-4 justify-center"></div>
                    </div>
                    
                    <a id="modal-wa-link" href="#" target="_blank" class="w-full max-w-sm bg-green-600 hover:bg-green-700 text-white text-center py-5 rounded-2xl text-[11px] font-bold uppercase tracking-widest transition-all" data-key="modal-cta">
                        Check Availability
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const translations = {
            en: {
                brand: "Bricoshop", "nav-home": "Home", "nav-about": "Why PVC?", "nav-catalog": "Collections", "nav-contact": "Contact",
                "cta-inquiry": "Order Inquiries", "page-title": "The 2026 Collection", "page-subtitle": "Select a category to browse our luxury solutions",
                "brand-footer": "Bricoshop Morocco", "brand-sub": "Premium PVC Manufacturing", "copyright": "© 2026 All Rights Reserved",
                "modal-badge": "Industrial Grade", "modal-finish": "Select Finish", "modal-cta": "Check Availability",
                "in-stock": "In Stock", "ref-label": "Catalog Reference: "
            },
            ar: {
                brand: "بريكوشوب", "nav-home": "الرئيسية", "nav-about": "لماذا PVC؟", "nav-catalog": "المجموعات", "nav-contact": "اتصل بنا",
                "cta-inquiry": "استفسارات الطلب", "page-title": "مجموعة 2026", "page-subtitle": "اختر فئة لتصفح حلولنا الفاخرة",
                "brand-footer": "بريكوشوب المغرب", "brand-sub": "تصنيع PVC متميز", "copyright": "© 2026 جميع الحقوق محفوظة",
                "modal-badge": "درجة صناعية", "modal-finish": "اختر اللون", "modal-cta": "التحقق من التوفر",
                "in-stock": "متوفر", "ref-label": "مرجع الكتالوج: "
            }
        };

        const categoryTranslations = {
            en: [
                { name: 'Bathroom Vanities', desc: '100% Humidity Proof / Solid PVC' },
                { name: 'Premium Sinks', desc: 'Anti-scratch surface / Waterproof' },
                { name: 'High-Density PVC Sheets', desc: 'Industrial Grade / UV Protected' },
                { name: 'Luxury Accessories', desc: 'PVD Coated / Corrosion Resistant' }
            ],
            ar: [
                { name: 'خزائن الحمامات', desc: 'مقاومة للرطوبة 100٪ / PVC صلب' },
                { name: 'أحواض متميزة', desc: 'سطح مضاد للخدش / مقاوم للماء' },
                { name: 'ألواح PVC عالية الكثافة', desc: 'درجة صناعية / محمية من الأشعة فوق البنفسجية' },
                { name: 'إكسسوارات فاخرة', desc: 'مطلية بـ PVD / مقاومة للتآكل' }
            ]
        };

        let currentLang = localStorage.getItem('selectedLang') || 'en';

        document.addEventListener('DOMContentLoaded', () => {
            renderCatalog();
            applyLanguage(currentLang);
        });

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            localStorage.setItem('selectedLang', currentLang);
            applyLanguage(currentLang);
            renderCatalog();
        }

        function applyLanguage(lang) {
            const htmlTag = document.getElementById('main-html');
            const langLabel = document.getElementById('lang-label');
            const navLinks = document.getElementById('nav-links');
            
            if (lang === 'ar') {
                htmlTag.setAttribute('dir', 'rtl');
                htmlTag.setAttribute('lang', 'ar');
                langLabel.innerText = "English";
                if (navLinks) navLinks.classList.add('flex-row-reverse');
            } else {
                htmlTag.setAttribute('dir', 'ltr');
                htmlTag.setAttribute('lang', 'en');
                langLabel.innerText = "العربية";
                if (navLinks) navLinks.classList.remove('flex-row-reverse');
            }

            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if (translations[lang][key]) el.innerHTML = translations[lang][key];
            });
        }

        const colorOptions = [
            { name: 'Arctic White', hex: '#ffffff' },
            { name: 'Onyx Black', hex: '#1a1a1a' },
            { name: 'Luxury Beige', hex: '#f5f5dc' },
            { name: 'Stone Gray', hex: '#808080' }
        ];

        const sk01Images = { 'Arctic White': 'https://i.postimg.cc/DZtnmXgz/Whats-App-Image-2026-04-13-at-6-19-54-PM-(1).jpg', 'Onyx Black': 'https://i.postimg.cc/rpskJJZq/Gemini-Generated-Image-40513v40513v4051.png', 'Luxury Beige': 'https://i.postimg.cc/1Xh1yZmK/Gemini-Generated-Image-y8esl5y8esl5y8es.png', 'Stone Gray': 'https://i.postimg.cc/qqsVRZq5/Gemini-Generated-Image-oicpiuoicpiuoicp.png' };
        const bt01Images = { 'Arctic White': 'https://i.postimg.cc/8P5vg8YP/Gemini-Generated-Image-4tehav4tehav4teh.png', 'Onyx Black': 'https://i.postimg.cc/WbVD6XxV/Gemini-Generated-Image-7m7hsy7m7hsy7m7h.png', 'Luxury Beige': 'https://i.postimg.cc/YSvjqVLY/Gemini-Generated-Image-2095us2095us2095.png', 'Stone Gray': 'https://i.postimg.cc/2y7SKNg3/Gemini-Generated-Image-c1wj2hc1wj2hc1wj.png' };
        const bt02Images = { 'Arctic White': 'https://i.postimg.cc/Xq5L0pxQ/Gemini-Generated-Image-8j5nn08j5nn08j5n.png', 'Onyx Black': 'https://i.postimg.cc/sXkPK3yv/Gemini-Generated-Image-n5tcjsn5tcjsn5tc.png', 'Luxury Beige': 'https://i.postimg.cc/zvqvqQFQ/Gemini-Generated-Image-mm2oinmm2oinmm2o.png', 'Stone Gray': 'https://i.postimg.cc/1tqw8b65/Gemini-Generated-Image-69msvc69msvc69ms.png' };
        const bt03Images = { 'Arctic White': 'https://i.postimg.cc/RhKJXfVL/Gemini-Generated-Image-cclhqdcclhqdcclh.png', 'Onyx Black': 'https://i.postimg.cc/fLjhCRQz/Gemini-Generated-Image-71tjx371tjx371tj.png', 'Luxury Beige': 'https://i.postimg.cc/KYtXc8zQ/Gemini-Generated-Image-72291r72291r7229.png', 'Stone Gray': 'https://i.postimg.cc/dt0KRFHF/Gemini-Generated-Image-y7l59ry7l59ry7l5.png' };
        const bt04Images = { 'Arctic White': 'https://i.postimg.cc/L5BSvkwQ/Untitled-design.png', 'Onyx Black': 'https://i.postimg.cc/ZKbz4d1R/Gemini-Generated-Image-monuismonuismonu.png', 'Luxury Beige': 'https://i.postimg.cc/fRQXVMfW/Gemini-Generated-Image-ou47g1ou47g1ou47.png', 'Stone Gray': 'https://i.postimg.cc/yNBFb7J4/Gemini-Generated-Image-ltbjkgltbjkgltbj.png' };

        function renderCatalog() {
            const container = document.getElementById('market-container');
            container.innerHTML = '';
            const prefixes = ['BT', 'SK', 'PV', 'AC'];
            const banners = [
                'https://images.unsplash.com/photo-1585412727339-54e4bae3bbf9?w=1200',
                'https://images.unsplash.com/photo-1584622650111-993a426fbf0a?w=1200',
                'https://images.unsplash.com/photo-1560440021-33f9b867899d?w=1200',
                'https://images.unsplash.com/photo-1527576539890-dfa815648363?w=1200'
            ];

            categoryTranslations[currentLang].forEach((cat, idx) => {
                const section = document.createElement('div');
                section.className = "category-section bg-white border border-stone-100 rounded-3xl overflow-hidden shadow-sm mb-6";
                section.innerHTML = `
                    <div class="category-banner flex items-center justify-center px-8 cursor-pointer group" style="background-image: url('${banners[idx]}')" onclick="this.parentElement.classList.toggle('active')">
                        <div class="relative z-10 text-center">
                            <h2 class="text-white text-xl font-bold uppercase tracking-tighter">${cat.name}</h2>
                            <p class="text-stone-300 text-[9px] uppercase tracking-widest font-medium">${cat.desc}</p>
                            <i class="fas fa-plus text-white mt-2 block text-xs"></i>
                        </div>
                    </div>
                    <div class="category-content p-6">
                        <div class="grid grid-cols-2 lg:grid-cols-4 gap-6 justify-items-center" id="grid-${prefixes[idx]}"></div>
                    </div>`;
                container.appendChild(section);

                const grid = document.getElementById(`grid-${prefixes[idx]}`);
                for(let i=1; i<=8; i++) {
                    const num = i < 10 ? `0${i}` : i;
                    let ref = `${prefixes[idx]}-${num}`;
                    let title = currentLang === 'ar' ? `${cat.name.split(' ')[0]} سلسلة ${num}` : `${cat.name.split(' ')[0]} Series ${num}`;
                    let defaultImg = 'https://i.postimg.cc/8P5vg8YP/Gemini-Generated-Image-4tehav4tehav4teh.png';

                    if (ref === 'SK-01') defaultImg = sk01Images['Arctic White'];
                    if (ref === 'BT-01') { defaultImg = bt01Images['Arctic White']; title = "KW-T004B"; }
                    if (ref === 'BT-02') { defaultImg = bt02Images['Arctic White']; title = "KW-T003B"; }
                    if (ref === 'BT-03') { defaultImg = bt03Images['Arctic White']; title = "KW-9003W"; }
                    if (ref === 'BT-04') { defaultImg = bt04Images['Arctic White']; title = "KW-9004W"; }

                    const card = document.createElement('div');
                    card.className = "market-card p-4 rounded-2xl cursor-pointer text-center";
                    card.onclick = (e) => { e.stopPropagation(); openModal(ref, title, defaultImg); };
                    card.innerHTML = `
                        <div class="aspect-square rounded-xl overflow-hidden bg-stone-50 mb-4 p-2 flex items-center justify-center">
                            <img src="${defaultImg}" class="max-h-full max-w-full object-contain">
                        </div>
                        <h3 class="text-[10px] font-bold uppercase tracking-tight truncate">${title}</h3>
                        <span class="text-[8px] font-bold text-stone-300 uppercase block mb-2">${ref}</span>
                        <span class="badge-stock mx-auto">${translations[currentLang]['in-stock']}</span>`;
                    grid.appendChild(card);
                }
            });
        }

        function openModal(ref, title, initialImg) {
            const modal = document.getElementById('product-modal');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-id').innerText = `${translations[currentLang]['ref-label']}${ref}`;
            const modalImg = document.getElementById('modal-img');
            modalImg.src = initialImg;
            
            const swatchContainer = document.getElementById('modal-color-swatches');
            swatchContainer.innerHTML = '';
            
            colorOptions.forEach((color, index) => {
                const btn = document.createElement('button');
                btn.className = "swatch w-10 h-10 rounded-full shadow-inner ring-2 ring-transparent hover:ring-stone-400 transition-all";
                btn.style.backgroundColor = color.hex;
                btn.onclick = () => {
                    if (ref === 'SK-01') modalImg.src = sk01Images[color.name];
                    else if (ref === 'BT-01') modalImg.src = bt01Images[color.name];
                    else if (ref === 'BT-02') modalImg.src = bt02Images[color.name];
                    else if (ref === 'BT-03') modalImg.src = bt03Images[color.name];
                    else if (ref === 'BT-04') modalImg.src = bt04Images[color.name];
                    
                    Array.from(swatchContainer.children).forEach(s => s.classList.remove('ring-black', 'scale-110'));
                    btn.classList.add('ring-black', 'scale-110');
                    const msgText = currentLang === 'ar' ? `استفسار عن: ${title} (${ref}) بلون ${color.name}` : `Inquiry for: ${title} (${ref}) in ${color.name} finish.`;
                    document.getElementById('modal-wa-link').href = `https://wa.me/212661176190?text=${encodeURIComponent(msgText)}`;
                };
                swatchContainer.appendChild(btn);
                if(index === 0) btn.click();
            });
            
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('product-modal').classList.remove('active');
            document.body.style.overflow = '';
        }
    </script>
</body>
</html>
