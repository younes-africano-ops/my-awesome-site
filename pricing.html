<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Professional Catalog | Bricoshop Luxury PVC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #fcfcfc; }
        .glass-nav { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(20px); }
        
        .category-content {
            display: none;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.4s ease;
        }
        .category-section.active .category-content {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }
        
        .market-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
        }
        .market-card:hover {
            border-color: #e5e7eb;
            background: #fff;
            transform: translateY(-4px);
            box-shadow: 0 10px 20px -10px rgba(0,0,0,0.05);
        }

        .category-banner {
            background-size: cover;
            background-position: center;
            height: 120px;
            position: relative;
        }
        .category-banner::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, rgba(0,0,0,0.7), transparent);
        }

        #product-modal { 
            transition: all 0.3s ease;
            pointer-events: none; 
            visibility: hidden;
            opacity: 0;
            z-index: 100;
        }
        #product-modal.active { 
            pointer-events: auto; 
            visibility: visible; 
            opacity: 1; 
        }
        
        .badge-stock { background: #ecfdf5; color: #059669; padding: 2px 8px; border-radius: 4px; font-size: 8px; font-weight: 700; text-transform: uppercase; }
    </style>
</head>
<body class="text-slate-900 antialiased">

    <nav class="fixed w-full z-50 glass-nav border-b border-stone-100">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-12">
                <a href="index.html" class="text-2xl font-bold tracking-tighter uppercase">Bricoshop</a>
                <div class="hidden md:flex items-center gap-6 text-[11px] font-bold uppercase tracking-[0.2em] text-stone-500">
                    <a href="index.html" class="hover:text-black transition-colors">Home</a>
                    <a href="about.html" class="hover:text-black transition-colors">Why PVC?</a>
                    <a href="pricing.html" class="text-black border-b border-black pb-1">Collections</a>
                    <a href="contact.html" class="hover:text-black transition-colors">Contact</a>
                </div>
            </div>
            <a href="https://wa.me/212661176190" target="_blank" class="bg-slate-900 text-white px-6 py-3 text-[10px] font-bold uppercase tracking-widest rounded-full hover:bg-black transition-all">
                Order Inquiries
            </a>
        </div>
    </nav>

    <main class="pt-32 pb-24 px-6 max-w-5xl mx-auto">
        <header class="mb-12 border-b border-stone-100 pb-8">
            <h1 class="text-3xl font-bold uppercase tracking-tighter mb-2">The 2026 Collection</h1>
            <p class="text-stone-400 text-sm uppercase tracking-widest">Select a category to browse our luxury solutions</p>
        </header>

        <div id="market-container" class="space-y-6"></div>
    </main>

    <footer class="bg-slate-950 text-white py-12 px-6">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
            <div class="text-center md:text-left">
                <h4 class="text-lg font-bold uppercase tracking-tighter mb-1">Bricoshop Morocco</h4>
                <p class="text-slate-500 text-[10px] uppercase tracking-widest">Premium PVC Manufacturing</p>
            </div>
            <p class="text-slate-600 text-[9px] uppercase tracking-[0.3em]">© 2026 All Rights Reserved</p>
        </div>
    </footer>

    <div id="product-modal" class="fixed inset-0 flex items-end sm:items-center justify-center">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-md" onclick="closeModal()"></div>
        <div class="relative bg-white w-full max-w-xl h-[85vh] sm:h-auto overflow-y-auto rounded-t-[2.5rem] sm:rounded-2xl p-8">
            <div class="w-12 h-1.5 bg-stone-100 rounded-full mx-auto mb-8 sm:hidden"></div>
            <div class="flex flex-col sm:flex-row gap-8">
                <div class="w-full sm:w-1/2 aspect-square rounded-xl overflow-hidden bg-stone-50 p-4">
                    <img id="modal-img" src="" class="w-full h-full object-contain">
                </div>
                <div class="w-full sm:w-1/2 flex flex-col justify-center">
                    <span class="badge-stock w-fit mb-4">Industrial Grade</span>
                    <h2 id="modal-title" class="text-2xl font-bold uppercase tracking-tighter mb-2"></h2>
                    <p id="modal-id" class="text-[11px] text-stone-500 font-medium mb-6 leading-relaxed whitespace-pre-line"></p>
                    <div class="mb-8">
                        <label class="text-[10px] font-bold uppercase tracking-widest text-stone-400 block mb-4">Select Finish</label>
                        <div id="modal-color-swatches" class="flex gap-4"></div>
                    </div>
                    <a id="modal-wa-link" href="#" target="_blank" class="w-full bg-green-600 hover:bg-green-700 text-white text-center py-4 rounded-xl text-xs font-bold uppercase tracking-widest transition-all">
                        Check Availability
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // GLOBAL COLORS CONFIGURATION
        const colorOptions = [
            { name: 'Arctic White', hex: '#ffffff' },
            { name: 'Onyx Black', hex: '#1a1a1a' },
            { name: 'Luxury Beige', hex: '#f5f5dc' },
            { name: 'Stone Gray', hex: '#808080' }
        ];

        // PRODUCT-SPECIFIC IMAGE COLLECTIONS
        const sk01Images = {
            'Arctic White': 'https://i.postimg.cc/DZtnmXgz/Whats-App-Image-2026-04-13-at-6-19-54-PM-(1).jpg',
            'Onyx Black': 'https://i.postimg.cc/rpskJJZq/Gemini-Generated-Image-40513v40513v4051.png',
            'Luxury Beige': 'https://i.postimg.cc/1Xh1yZmK/Gemini-Generated-Image-y8esl5y8esl5y8es.png',
            'Stone Gray': 'https://i.postimg.cc/qqsVRZq5/Gemini-Generated-Image-oicpiuoicpiuoicp.png'
        };

        const bt01Images = {
            'Arctic White': 'https://i.postimg.cc/8P5vg8YP/Gemini-Generated-Image-4tehav4tehav4teh.png',
            'Onyx Black': 'https://i.postimg.cc/WbVD6XxV/Gemini-Generated-Image-7m7hsy7m7hsy7m7h.png',
            'Luxury Beige': 'https://i.postimg.cc/YSvjqVLY/Gemini-Generated-Image-2095us2095us2095.png',
            'Stone Gray': 'https://i.postimg.cc/2y7SKNg3/Gemini-Generated-Image-c1wj2hc1wj2hc1wj.png'
        };

        const bt02Images = {
            'Arctic White': 'https://i.postimg.cc/RhKJXfVL/Gemini-Generated-Image-cclhqdcclhqdcclh.png',
            'Onyx Black': 'https://i.postimg.cc/fLjhCRQz/Gemini-Generated-Image-71tjx371tjx371tj.png',
            'Luxury Beige': 'https://i.postimg.cc/KYtXc8zQ/Gemini-Generated-Image-72291r72291r7229.png',
            'Stone Gray': 'https://i.postimg.cc/dt0KRFHF/Gemini-Generated-Image-y7l59ry7l59ry7l5.png'
        };

        const bt03Images = {
            'Arctic White': 'https://i.postimg.cc/Xq5L0pxQ/Gemini-Generated-Image-8j5nn08j5nn08j5n.png',
            'Onyx Black': 'https://i.postimg.cc/sXkPK3yv/Gemini-Generated-Image-n5tcjsn5tcjsn5tc.png',
            'Luxury Beige': 'https://i.postimg.cc/zvqvqQFQ/Gemini-Generated-Image-mm2oinmm2oinmm2o.png',
            'Stone Gray': 'https://i.postimg.cc/1tqw8b65/Gemini-Generated-Image-69msvc69msvc69ms.png'
        };

        const catalogData = [
            { name: 'Bathroom Vanities', id: 'bathrooms', prefix: 'BT', banner: 'https://images.unsplash.com/photo-1585412727339-54e4bae3bbf9?w=1200', desc: '100% Humidity Proof / Solid PVC' },
            { name: 'Premium Sinks', id: 'sinks', prefix: 'SK', banner: 'https://images.unsplash.com/photo-1584622650111-993a426fbf0a?w=1200', desc: 'Anti-scratch surface / Waterproof' },
            { name: 'High-Density PVC Sheets', id: 'pvc', prefix: 'PV', banner: 'https://images.unsplash.com/photo-1560440021-33f9b867899d?w=1200', desc: 'Industrial Grade / UV Protected' },
            { name: 'Luxury Accessories', id: 'accessories', prefix: 'AC', banner: 'https://images.unsplash.com/photo-1527576539890-dfa815648363?w=1200', desc: 'PVD Coated / Corrosion Resistant' }
        ];

        const container = document.getElementById('market-container');

        catalogData.forEach(cat => {
            const section = document.createElement('div');
            section.className = "category-section bg-white border border-stone-100 rounded-3xl overflow-hidden shadow-sm mb-6";
            section.innerHTML = `
                <div class="category-banner flex items-center px-8 cursor-pointer group" style="background-image: url('${cat.banner}')" onclick="this.parentElement.classList.toggle('active')">
                    <div class="relative z-10 flex items-center justify-between w-full">
                        <div>
                            <h2 class="text-white text-xl font-bold uppercase tracking-tighter">${cat.name}</h2>
                            <p class="text-stone-300 text-[9px] uppercase tracking-widest font-medium">${cat.desc}</p>
                        </div>
                        <div class="w-10 h-10 rounded-full border border-white/30 flex items-center justify-center text-white group-hover:bg-white group-hover:text-black transition-all">
                            <i class="fas fa-plus text-xs chevron"></i>
                        </div>
                    </div>
                </div>
                <div class="category-content p-6">
                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-6" id="grid-${cat.id}"></div>
                </div>`;
            container.appendChild(section);

            const grid = document.getElementById(`grid-${cat.id}`);
            for(let i=1; i<=8; i++) {
                const num = i < 10 ? `0${i}` : i;
                let ref = `${cat.prefix}-${num}`;
                let title = `${cat.name.split(' ')[0]} Series ${num}`;
                let defaultImg = 'https://i.postimg.cc/8P5vg8YP/Gemini-Generated-Image-4tehav4tehav4teh.png';
                let customDesc = "";

                if (ref === 'SK-01') defaultImg = sk01Images['Arctic White'];
                
                if (ref === 'BT-01') { 
                    defaultImg = bt01Images['Arctic White']; 
                    title = "KW-T004B-"; 
                }
                if (ref === 'BT-02') { 
                    defaultImg = bt02Images['Arctic White']; 
                    title = "KW-9003W"; 
                }
                if (ref === 'BT-03') { 
                    defaultImg = bt03Images['Arctic White']; 
                    title = "KW-T003B-"; 
                }

                const card = document.createElement('div');
                card.className = "market-card p-3 rounded-2xl cursor-pointer";
                card.onclick = (e) => { e.stopPropagation(); openModal(ref, title, defaultImg, customDesc); };
                card.innerHTML = `
                    <div class="aspect-square rounded-xl overflow-hidden bg-stone-50 mb-4 p-2">
                        <img src="${defaultImg}" class="w-full h-full object-contain">
                    </div>
                    <div class="flex justify-between items-start mb-1">
                        <h3 class="text-[10px] font-bold uppercase tracking-tight truncate w-3/4">${title}</h3>
                        <span class="text-[8px] font-bold text-stone-300 uppercase">${ref}</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="badge-stock">In Stock</span>
                    </div>`;
                grid.appendChild(card);
            }
        });

        function openModal(ref, title, initialImg, description) {
            const modal = document.getElementById('product-modal');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-id').innerText = description || `Catalog Reference: ${ref}`;
            const modalImg = document.getElementById('modal-img');
            modalImg.src = initialImg;
            
            const swatchContainer = document.getElementById('modal-color-swatches');
            swatchContainer.innerHTML = '';
            
            colorOptions.forEach((color, index) => {
                const btn = document.createElement('button');
                btn.className = "swatch w-10 h-10 rounded-full shadow-inner ring-2 ring-transparent hover:ring-stone-400 transition-all";
                btn.style.backgroundColor = color.hex;
                btn.onclick = () => {
                    if (ref === 'SK-01') modalImg.src = sk01Images[color.name];
                    else if (ref === 'BT-01') modalImg.src = bt01Images[color.name];
                    else if (ref === 'BT-02') modalImg.src = bt02Images[color.name];
                    else if (ref === 'BT-03') modalImg.src = bt03Images[color.name];
                    else modalImg.src = 'https://i.postimg.cc/8P5vg8YP/Gemini-Generated-Image-4tehav4tehav4teh.png';
                    
                    Array.from(swatchContainer.children).forEach(s => s.classList.remove('ring-black', 'scale-110'));
                    btn.classList.add('ring-black', 'scale-110');
                    const msg = encodeURIComponent(`Inquiry for: ${title} (${ref}) in ${color.name} finish.`);
                    document.getElementById('modal-wa-link').href = `https://wa.me/212661176190?text=${msg}`;
                };
                swatchContainer.appendChild(btn);
                if(index === 0) btn.click();
            });
            
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('product-modal').classList.remove('active');
            document.body.style.overflow = '';
        }
    </script>
</body>
</html>
