<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Collection | Bricoshop Luxury PVC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@300;400;500&family=Playfair+Display:italic,wght@400;700&display=swap" rel="stylesheet">
    <style>
       #product-modal { 
            transition: opacity 0.3s ease, visibility 0.3s; 
            pointer-events: none; 
            visibility: hidden;
            opacity: 0;
        }
        #product-modal.modal-open { 
            pointer-events: auto; 
            visibility: visible; 
            opacity: 1; 
        }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="bg-[#FCFAFA] text-slate-900 antialiased">

    <nav class="fixed w-full z-40 glass-nav border-b border-stone-200">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <a href="index.html" class="text-2xl font-bold tracking-tighter uppercase">Bricoshop</a>
            <div class="hidden md:flex space-x-10 text-sm font-medium tracking-wide uppercase">
                <a href="index.html" class="hover:text-neutral-500 transition-colors">Home</a>
                <a href="pricing.html" class="text-slate-900 border-b border-black pb-1">Collections</a>
                <a href="about.html" class="hover:text-neutral-500 transition-colors">Why PVC?</a>
                <a href="contact.html" class="hover:text-neutral-500 transition-colors">Contact</a>
            </div>
            <a href="https://wa.me/212661176190" target="_blank" class="bg-slate-900 text-white px-6 py-3 text-xs font-bold uppercase tracking-widest hover:bg-slate-800 transition-all">Get a Quote</a>
        </div>
    </nav>

    <div id="product-modal" class="fixed inset-0 z-[60] invisible opacity-0 flex items-center justify-center px-4 md:px-0">
        <div class="absolute inset-0 bg-stone-900/90 backdrop-blur-sm" onclick="closeModal()"></div>
        <div id="modal-content" class="relative bg-white w-full max-w-5xl grid md:grid-cols-2 overflow-hidden shadow-2xl scale-95 transition-transform duration-500">
            <button onclick="closeModal()" class="absolute top-4 right-4 z-50 text-stone-400 hover:text-black transition-colors text-2xl">&times;</button>
            <div class="bg-stone-100 aspect-square md:aspect-auto">
                <img id="modal-img" src="" class="w-full h-full object-cover transition-opacity duration-300">
            </div>
            <div class="p-12 flex flex-col justify-center space-y-8">
                <div>
                    <h4 class="text-[10px] uppercase tracking-[0.4em] text-stone-400 mb-2">Collection 2026</h4>
                    <h2 id="modal-title" class="text-3xl font-light tracking-tight mb-4">Product Name</h2>
                    <p id="modal-desc" class="text-stone-500 text-sm leading-relaxed">Luxury finishes in 100% water-resistant PVC.</p>
                </div>
                <div class="space-y-4 border-t border-stone-100 pt-8">
                    <span class="text-[10px] uppercase tracking-widest font-bold">Select Finish</span>
                    <div id="modal-color-buttons" class="flex flex-wrap gap-4"></div>
                    <p id="modal-color-name" class="text-xs italic text-stone-400 uppercase tracking-widest"></p>
                </div>
                <div class="pt-8">
                    <a id="modal-wa-link" href="#" target="_blank" class="inline-block w-full bg-slate-900 text-white text-center py-4 text-xs font-bold uppercase tracking-widest hover:bg-slate-800 transition-all">Inquire via WhatsApp</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ... [Product Data Remains Same] ...

        function updateModalImage(productId, colorName) {
            const img = document.getElementById('modal-img');
            const label = document.getElementById('modal-color-name');
            const newSrc = productData[productId].colors[colorName];
            img.style.opacity = '0';
            setTimeout(() => {
                img.src = newSrc;
                label.innerText = colorName + " FINISH";
                img.style.opacity = '1';
                document.getElementById(`grid-img-${productId}`).src = newSrc;
            }, 200);
            const message = encodeURIComponent(`Hi, I'm interested in ${productData[productId].title} (${colorName}).`);
            // Updated to your correct WhatsApp number
            document.getElementById('modal-wa-link').href = `https://wa.me/212661176190?text=${message}`;
        }
    </script>
</body>
</html>
